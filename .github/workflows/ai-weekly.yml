name: AI Weekly Collector

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate weekly AI post
        run: python scripts/generate_ai_weekly.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/zh/blog/ai-weekly
          if git diff --cached --quiet; then
            echo "No new weekly post generated"
            exit 0
          fi
          git commit -m "chore: auto publish weekly ai digest"
          git push
